<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Last Thing</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#F6F1EE,#ECE2DD,#E5D7D0);
font-family:'Poppins',sans-serif;
text-align:center;
}

.container{
padding:30px;
}

h1{
font-family:'Cormorant Garamond',serif;  
color:#ff5c9f;
font-size:40px;
}

p{
font-size:22px;
color:#555;
min-height:70px;
}

button{
display:none;
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff5c9f;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🤍 One Last Thing...</h1>

<p id="text"></p>

<button id="btn" onclick="location.href='chapter1.html'">

💌 Read My Letters

</button>

</div>

<audio autoplay loop>
<source src="aboutyou.mp3" type="audio/mpeg">
</audio>

<script>

const text=document.getElementById("text");

setTimeout(()=>{

text.innerHTML="The games are over...";

},1000);

setTimeout(()=>{

text.innerHTML="Now, let me tell you something I've always wanted to say. 🤍";

},3000);

setTimeout(()=>{

document.getElementById("btn").style.display="inline-block";

},5000);

</script>

</body>
</html>
