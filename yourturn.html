<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sekarang Giliran Kamu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#FAF6F4,
#F3E8E3,
#E8D7D1
);

overflow-x:hidden;
overflow-y:auto;

min-height:100vh;

padding:70px 20px;

position:relative;

}

/* ==========================
Background Glow
========================== */

body::before{

content:"";

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:700px;
height:700px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(109,41,50,.08),
transparent 70%
);

filter:blur(35px);

animation:glow 8s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes glow{

from{

transform:translate(-50%,-50%) scale(.92);

}

to{

transform:translate(-50%,-50%) scale(1.08);

}

}

/* ==========================
Container
========================== */

.container{

max-width:760px;

margin:auto;

background:rgba(255,255,255,.72);

backdrop-filter:blur(18px);

padding:55px;

border-radius:30px;

box-shadow:
0 18px 45px rgba(109,41,50,.12);

}

/* ==========================
Title
========================== */

.title{

font-family:'Cormorant Garamond',serif;

font-size:62px;

color:#6D2932;

text-align:center;

margin-bottom:18px;

opacity:0;

transform:translateY(-20px);

animation:fadeDown 1.4s forwards;

}

.subtitle{

font-size:19px;

line-height:1.9;

color:#7D6764;

text-align:center;

margin-bottom:45px;

opacity:0;

animation:fade 2s forwards;

animation-delay:.8s;

}

@keyframes fadeDown{

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes fade{

to{

opacity:1;

}

}

/* ==========================
Question
========================== */

.question{

margin-top:28px;

font-size:20px;

font-weight:600;

color:#6D2932;

margin-bottom:14px;

}

/* ==========================
Input
========================== */

select,
textarea{

width:100%;

border:none;

outline:none;

padding:18px;

border-radius:18px;

background:#FFFDFC;

font-size:16px;

font-family:'Poppins',sans-serif;

box-shadow:
inset 0 0 8px rgba(0,0,0,.05);

margin-bottom:20px;

resize:none;

}

textarea{

min-height:150px;

line-height:1.8;

}

/* ==========================
Button
========================== */

button{

margin-top:25px;

padding:18px 42px;

border:none;

border-radius:45px;

background:#6D2932;

color:white;

font-size:18px;

font-weight:600;

font-family:'Poppins',sans-serif;

cursor:pointer;

transition:.35s;

box-shadow:
0 12px 28px rgba(109,41,50,.22);

}

button:hover{

transform:translateY(-3px);

background:#83404C;

}

/* ==========================
Loading
========================== */

#loading{

display:none;

margin-top:35px;

font-size:22px;

color:#6D2932;

font-weight:500;

text-align:center;

animation:fade .6s;

}

/* ==========================
Thanks
========================== */

#thanks{

display:none;

margin-top:40px;

text-align:center;

animation:fade 1s;

}

#thanks h2{

font-family:'Great Vibes',cursive;

font-size:52px;

color:#6D2932;

}

#thanks p{

margin-top:20px;

font-size:19px;

line-height:2;

color:#6D2932;

}

#thanks .end{

margin-top:35px;

font-family:'Great Vibes',cursive;

font-size:42px;

color:#6D2932;

}

/* ==========================
Responsive
========================== */

@media(max-width:600px){

.container{

padding:35px 22px;

}

.title{

font-size:48px;

}

.subtitle{

font-size:17px;

}

.question{

font-size:18px;

}

select,
textarea{

font-size:15px;

}

button{

width:100%;

}

#thanks h2{

font-size:42px;

}

#thanks .end{

font-size:36px;

}

}

<div class="container">

<h1 class="title">
Sekarang Giliran Kamu 🤍
</h1>

<p class="subtitle">
Dari awal sampai akhir,
semuanya tentang cerita dari Cecel.<br><br>

Sekarang...
aku pengen denger cerita dari kamu juga. 🌸
</p>

<form id="birthdayForm">

<div class="question">
🌷 Halaman mana yang paling kamu suka?
</div>

<select name="favorite" required>

<option value="">-- Pilih yaa --</option>

<option>Chapter 1</option>
<option>Chapter 2</option>
<option>Chapter 3</option>
<option>Chapter 4</option>
<option>Catch My Heart 🤍</option>
<option>One More Gift 🎁</option>
<option>Memory</option>
<option>Birthday Cake 🎂</option>
<option>The End</option>

</select>

<div class="question">
🤎 Setelah selesai lihat semuanya...
<br><br>
Apa yang kamu rasain waktu buka website ini?
</div>

<textarea
name="feeling"
required
placeholder="Ceritain aja yaa... aku bakal baca semuanya 🤍"></textarea>

<div class="question">
💌 Ada sesuatu yang pengen kamu sampaikan buat Cecel?
</div>

<textarea
name="message"
required
placeholder="Write anything you want... 🤍"></textarea>

<div style="text-align:center;">

<button type="submit">
Kirim Buat Cecel 🤍
</button>

</div>

</form>

<div id="loading">

🤍

<br><br>

Mengirim pesan...

<br><br>

<span id="dots">.</span>

</div>

<div id="thanks">

<h2>
Makasih yaa Tua... 🤍
</h2>

<p>

Kalau kamu sampai baca sejauh ini,<br>

berarti semua waktu yang aku habisin<br>

buat bikin website ini nggak sia-sia.

<br><br>

Semoga suatu hari nanti,<br>

kita bisa buka website ini lagi<br>

sambil ketawa bareng. 🌸

</p>

<div class="end">

See you in another story. 🤍

</div>

<button id="endButton">

The End

</button>

</div>

</div>

const form = document.getElementById("birthdayForm");
const loading = document.getElementById("loading");
const thanks = document.getElementById("thanks");
const dots = document.getElementById("dots");
const endButton = document.getElementById("endButton");

form.addEventListener("submit", async function(e){

e.preventDefault();

loading.style.display="block";

let n=1;

const anim=setInterval(()=>{

dots.textContent=".".repeat(n);

n++;

if(n>3) n=1;

},500);

const formData=new FormData(form);

try{

const response=await fetch("https://formspree.io/f/xbdvvega",{

method:"POST",

body:formData,

headers:{
'Accept':'application/json'
}

});

clearInterval(anim);

loading.style.display="none";

if(response.ok){

form.style.display="none";

thanks.style.display="block";

window.scrollTo({

top:document.body.scrollHeight,

behavior:"smooth"

});

}else{

alert("Pesan gagal dikirim 😭 Coba lagi ya.");

form.style.display="block";

}

}catch(error){

clearInterval(anim);

loading.style.display="none";

alert("Tidak ada koneksi internet 😭");

form.style.display="block";

}

});

endButton.onclick=function(){

document.body.style.transition="opacity 1.4s ease";

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="end.html";

},1400);

};

/* ==========================
Fade saat halaman dibuka
========================== */

window.onload=function(){

document.body.style.opacity="0";

document.body.style.transition="opacity 1.3s ease";

setTimeout(()=>{

document.body.style.opacity="1";

},100);

};

/* ==========================
Hover halus tombol
========================== */

document.querySelectorAll("button").forEach(btn=>{

btn.addEventListener("mouseenter",()=>{

btn.style.transform="translateY(-4px) scale(1.02)";

});

btn.addEventListener("mouseleave",()=>{

btn.style.transform="translateY(0) scale(1)";

});

});

/* ==========================
Enter = Submit
========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Enter" && e.ctrlKey){

form.requestSubmit();

}

});
