<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Letter For Tua</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#F6F1EE,#ECE2DD,#E5D7D0);
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;
}

.card{
width:100%;
max-width:820px;
background:white;
padding:45px;
border-radius:28px;
box-shadow:0 18px 40px rgba(109,41,50,.15);
animation:fadeCard 1s ease;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:45px;
text-align:center;
color:#5B2333;
margin-bottom:35px;
}

#typing{
font-size:18px;
line-height:2;
white-space:pre-wrap;
color:#4A3B39;
min-height:320px;
}

button{
display:block;
opacity:0;
pointer-events:none;
margin:40px auto 0;
padding:15px 38px;
border:none;
border-radius:40px;
background:#5B2333;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.35s;
}

button:hover{
background:#7A3046;
transform:translateY(-3px);
}

.fadeButton{
display:block;
opacity:1;
pointer-events:auto;
animation:fadeButton .8s ease forwards;
}

@keyframes fadeCard{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeButton{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<h1>🦋 A Letter For Tua 🦋</h1>

<div id="typing"></div>

<center>

<button id="nextBtn"
onclick="window.location.href='heart.html'">

Next ➜

</button>

</center>

</div>

<script>

const surat = `aku ga tau...

di masa depan nanti...

kisah kita bakal berakhir seperti apa.

aku juga ga pernah tau...

apakah semesta bakal ngizinin kita tetap ada di bab yang sama...

atau justru harus berjalan di jalan masing-masing.

kalau nanti...

akhir cerita kita ternyata sama kayak kisah adekmu...

aku bakal nerima kok.

mungkin...

memang itu takdir yang udah Allah tulis.

berarti...

kita memang ditakdirkan buat saling mengenal...

tapi bukan buat saling memiliki.

dan kalau memang begitu...

aku cuma punya satu harapan.

tetep jadi ajam yang aku kenal.

tetep jadi si Tuaa botakk yang suka nyebelin itu. 🤏🏻

kalau suatu hari nanti kita ketemu...

jangan pura-pura ga kenal ya.

minimal...

senyum dikit.

atau nyapa.

itu aja udah cukup buat aku. 🤍

dan...

maaf ya, Tuaa.

karena tanpa sadar...

aku pernah ngerepotin kamu.

aku juga minta maaf...

karena perasaan aku ini...

harusnya jadi urusan aku sendiri.

bukan malah bikin kamu ikut kepikiran.

terima kasih ya...

buat semua waktu...

buat semua perhatian...

buat semua kenangan...

dan buat semua hal kecil yang mungkin kamu anggap biasa...

tapi buat aku...

semuanya berarti.

aku bakal selalu bersyukur...

karena pernah dipertemukan sama seseorang sebaik kamu.

dan walaupun nanti...

kisah kita selesai di halaman yang berbeda...

aku harap...

kamu selalu bahagia.

selalu sehat.

selalu dikelilingi orang-orang yang sayang sama kamu.

dan semoga...

semua mimpi yang pernah kamu ceritain...

satu per satu bisa terwujud.

terima kasih ya...

udah jadi salah satu bab terindah di hidup aku.

aku ga akan pernah nyesel pernah kenal kamu.

bahkan...

kalau Tuhan kasih aku kesempatan buat mengulang semuanya...

aku tetap akan memilih bab yang mempertemukan aku sama kamu.

sekali lagi...

selamat ulang tahun, Tua.

dan...

terima kasih untuk segalanya. 🤍`;

const text=document.getElementById("typing");
const nextBtn=document.getElementById("nextBtn");

let i=0;

function ketik(){

if(i<surat.length){

text.innerHTML+=surat.charAt(i);

i++;

setTimeout(ketik,55);

}else{

nextBtn.style.opacity="1";
nextBtn.style.pointerEvents="auto";
nextBtn.classList.add("fadeButton");

}

}

setTimeout(ketik,700);

</script>

</body>

</html>
