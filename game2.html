<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One More Little Surprise</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(135deg,
#FCF8F6,
#F3E9E4,
#EADAD5);

overflow-x:hidden;
overflow-y:auto;

min-height:100vh;

position:relative;

}

/* Background Glow */

body::before{

content:"";

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:700px;
height:700px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(109,41,50,.08),
transparent 70%);

filter:blur(35px);

animation:glow 8s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes glow{

from{

transform:translate(-50%,-50%) scale(.92);

}

to{

transform:translate(-50%,-50%) scale(1.08);

}

}

/* Sparkle */

.sparkle{

position:absolute;

width:4px;
height:4px;

border-radius:50%;

background:white;

opacity:.7;

animation:blink 2.5s infinite;

}

@keyframes blink{

0%,100%{

opacity:.25;
transform:scale(.8);

}

50%{

opacity:1;
transform:scale(1.5);

}

}

/* Container */

.container{

width:92%;
max-width:720px;

margin:auto;

padding:

80px
20px
100px;

text-align:center;

}

/* Title */

h1{

font-family:'Cormorant Garamond',serif;

font-size:56px;

color:#6D2932;

margin-bottom:15px;

}

.subtitle{

font-size:19px;

color:#8A6A67;

line-height:1.8;

margin-bottom:55px;

}

/* Gift Area */

.boxes{

display:flex;

justify-content:center;

align-items:center;

gap:35px;

flex-wrap:wrap;

}

/* Gift */

.gift{

font-size:82px;

cursor:pointer;

transition:.35s;

animation:float 2.2s ease-in-out infinite;

filter:drop-shadow(0 10px 12px rgba(0,0,0,.12));

}

.gift:hover{

transform:scale(1.15) rotate(-6deg);

}

@keyframes float{

0%{

transform:translateY(0);

}

50%{

transform:translateY(-12px);

}

100%{

transform:translateY(0);

}

}

/* Message */

#message{

margin-top:50px;

min-height:70px;

font-size:22px;

font-weight:600;

color:#6D2932;

line-height:1.8;

transition:.4s;

}

/* Button */

#next{

display:none;

margin-top:35px;

padding:18px 45px;

border:none;

border-radius:50px;

background:#6D2932;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

box-shadow:
0 12px 26px rgba(109,41,50,.25);

transition:.35s;

}

#next:hover{

background:#83414C;

transform:translateY(-3px);

}

</style>

</head>

<body>

<div class="container">

<h1>🎁 One More Little Surprise</h1>

<p class="subtitle">

Before we continue...<br>

Choose one little gift prepared especially for you. 🤍

</p>

<div class="boxes">

<div class="gift" onclick="wrongGift()">

🎁

</div>

<div class="gift" onclick="rightGift()">

🎁

</div>

<div class="gift" onclick="wrongGift()">

🎁

</div>

</div>

<div id="message">

</div>

<button id="next">

Continue Our Story ➜

</button>

</div>

<script>

/* ===========================
   Sparkle Background
=========================== */

for(let i=0;i<40;i++){

const s=document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*window.innerWidth+"px";

s.style.top=Math.random()*window.innerHeight+"px";

s.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(s);

}

/* ===========================
   Wrong Gift
=========================== */

const wrongMessage=[

"🙄 Upcyy salah, coba lagi yaa tua.",

"🤏 Dikit lagii... coba yang lain yaa.",

"🌸 Hehe... belum yang ini."

];

function wrongGift(){

const random=Math.floor(Math.random()*wrongMessage.length);

const msg=document.getElementById("message");

msg.innerHTML=wrongMessage[random];

msg.style.color="#6D2932";

}

/* ===========================
   Right Gift
=========================== */

function rightGift(){

const msg=document.getElementById("message");

msg.innerHTML=`

🎉 Yayyy!! 🤍<br><br>

You found the little surprise<br>

prepared by Cecel.

`;

msg.style.color="#6D2932";

confetti();

document.getElementById("next").style.display="inline-block";

  }

/* ===========================
   Confetti
=========================== */

function confetti(){

for(let i=0;i<120;i++){

const c=document.createElement("div");

c.innerHTML=["🤍","🌸","✨","🎉","🌹"][Math.floor(Math.random()*5)];

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-40px";

c.style.fontSize=(18+Math.random()*16)+"px";

c.style.pointerEvents="none";

document.body.appendChild(c);

let y=-40;
let x=parseFloat(c.style.left);
let drift=(Math.random()*2)-1;

const fall=setInterval(()=>{

y+=4;

x+=drift;

c.style.top=y+"px";
c.style.left=x+"px";

c.style.transform=`rotate(${y}deg)`;

if(y>window.innerHeight+40){

clearInterval(fall);

c.remove();

}

},20);

}

}

/* ===========================
   Sakura
=========================== */

function sakura(){

const s=document.createElement("div");

s.innerHTML="🌸";

s.style.position="fixed";

s.style.left=Math.random()*100+"vw";

s.style.top="-30px";

s.style.fontSize=(20+Math.random()*12)+"px";

s.style.pointerEvents="none";

document.body.appendChild(s);

let y=-30;
let x=parseFloat(s.style.left);

const fall=setInterval(()=>{

y+=2;
x+=Math.random()*1.4-.7;

s.style.top=y+"px";
s.style.left=x+"px";

if(y>window.innerHeight+40){

clearInterval(fall);

s.remove();

}

},20);

}

/* Mulai sakura setelah hadiah benar */

setInterval(()=>{

if(document.getElementById("next").style.display=="inline-block"){

sakura();

}

},700);

/* ===========================
   Fade Button
=========================== */

const next=document.getElementById("next");

const oldDisplay=Object.getOwnPropertyDescriptor(
CSSStyleDeclaration.prototype,
"display"
);

/* tombol muncul */

function showButton(){

next.style.display="inline-block";

next.animate([

{

opacity:0,
transform:"translateY(20px)"

},

{

opacity:1,
transform:"translateY(0)"

}

],{

duration:700,
fill:"forwards"

});

}

/* Override rightGift */

function rightGift(){

const msg=document.getElementById("message");

msg.innerHTML=`

🎉 Yayyy!! 🤍<br><br>

You found the little surprise<br>

prepared by Cecel.

`;

msg.style.color="#6D2932";

document.querySelectorAll(".gift").forEach(g=>{

g.style.animation="none";

g.style.cursor="default";

});

confetti();

showButton();

}

/* ===========================
   Next Page
=========================== */

next.onclick=function(){

document.body.style.transition="opacity 1.2s ease";

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="heart.html";

},1200);

};

</script>

</body>

</html>
