<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One More Gift</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  
<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#F6F1EE,#ECE2DD,#E5D7D0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
line-height:1.7;
letter-spacing:.3px; 
}

.container{
background:white;
padding:40px;
border-radius:24px;
box-shadow:0 12px 30px rgba(109,41,50,.15);
width:90%;
max-width:500px;
}

h1{
font-family:'Cormorant Garamond',serif;  
color:#6D2932
}

.boxes{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.gift{
font-size:70px;
cursor:pointer;
transition:.3s;
}

.gift:hover{
transform:scale(1.2);
}

#message{
margin-top:25px;
font-size:20px;
color:#666;
font-weight:bold;
}

button{
display:none;
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#6D2932;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 18px rgba(109,41,50,.25);
}

</style>

</head>

<body>

<div class="container">

<h1>🎁 One More Gift For Tuaa Botakk</h1>

<p>Pilih yaa satu hadiah yang menurutmu paling beruntung 🤍</p>

<div class="boxes">

<div class="gift" onclick="wrong()">🎁</div>

<div class="gift" onclick="right()">🎁</div>

<div class="gift" onclick="wrong()">🎁</div>

</div>

<div id="message"></div>

<button id="next" onclick="location.href='heart.html'">

Continue ☁️

</button>

</div>

<script>

function wrong(){

document.getElementById("message").innerHTML="🙄 Upcyy salah, coba lagi yaa tua.";

}

function right(){

document.getElementById("message").innerHTML="🎉 Horee! Kamu dapet hadiah dari bocilmu 🫶🏻";

document.getElementById("next").style.display="inline-block";

}

</script>

</body>
</html>
