<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Memories</title>

<style>

body{
margin:0;
padding:30px;
background:linear-gradient(135deg,#FFE4EC,#FFF7FB,#FFFFFF);
font-family:Poppins,Arial,sans-serif;
}

h1{
text-align:center;
color:#ff6b9d;
}

p{
text-align:center;
color:#666;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:40px;
}

.card{
width:220px;
background:white;
padding:12px;
border-radius:18px;
box-shadow:0 10px 20px rgba(0,0,0,.12);
transform:rotate(-2deg);
transition:.3s;
}

.card:hover{
transform:scale(1.05) rotate(0deg);
}

.card img{
width:100%;
border-radius:12px;
}

.caption{
margin-top:10px;
font-size:15px;
text-align:center;
}

button{
margin-top:40px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff7eb3;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.center{
text-align:center;
}

</style>

</head>

<body>

<h1>📸 Little Memories With You 🤍</h1>

<p>
Mungkin fotonya nggak banyak,
tapi setiap foto selalu punya cerita.
</p>

<div class="gallery">

<div class="card">

<img src="foto1.jpg">

<div class="caption">
Starboy paling ganteng. 🤍
</div>

</div>

<div class="card">

<img src="foto2.jpg">

<div class="caption">
Masih inget hari itu?
</div>

</div>

<div class="card">

<img src="foto3.jpg">

<div class="caption">
Thank you for existing.
</div>

</div>

</div>

<div class="center">

<button onclick="window.location.href='game2.html'">

Continue ➜

</button>

</div>

</body>
</html>
