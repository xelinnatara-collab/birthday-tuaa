<!DOCTYPE html>
<html>
<head>
<title>Quiz Time</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#F6F1EE,#ECE2DD,#E5D7D0);
color:#444;
font-family:'Poppins',sans-serif;
text-align:center;
padding:40px;
line-height:1.7;
letter-spacing:.3px;  
}

.box{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:24px;
box-shadow:0 12px 30px rgba(109,41,50,.15);
animation:fade .8s;
}
  
button{
display:inline-block;
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#6D2932;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.35s ease;
box-shadow:0 8px 18px rgba(109,41,50,.25);
}

.option:nth-child(1){background:#FF8FAB;}
.option:nth-child(2){background:#FFD166;color:#333;}
.option:nth-child(3){background:#7BC96F;}
.option:nth-child(4){background:#A78BFA;}

.option:hover{
transform:scale(1.05);
.option{
display:block;
width:100%;
margin:12px 0;
}
}

 @keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
} 
  
.option:hover{
background:#555;
}

.finishBox{

display:none;

margin-top:25px;

animation:fade .8s;

}

.finishBox button{

margin-top:18px;

padding:15px 35px;

border:none;

border-radius:40px;

background:#6D2932;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.finishBox button:hover{

transform:scale(1.05);

background:#87414C;

}

</style>

</head>

<body>

<div class="box">

<h1>🌸Seberapa Kamu Kenal Cecel?🌸</h1>

<p style="font-size:18px;">
Selesaikan tantangan kecil ini untuk membuka surat rahasia. 😽
</p>

<h3 id="question"></h3>

<div id="answers"></div>

<div id="finishBox" class="finishBox">

<h2>🎉 Yeayy!!</h2>

<p>

Ternyata Tua kenal Cecel yaa. 🤍<br>

Sekarang aku mau nunjukin sesuatu buat kamu...

</p>

<button onclick="selesai()">

Continue ☁️

</button>

</div>

<script>

let nomor=0;

const quiz=[

{
q:"1. Makanan yang menaikkan mood Cecel?",
a:[
["Miee","Aku dikasih semua juga suka, tapi lebih suka kamu hahaha 🙀🤍"],
["Dimsum",false],
["Terang Bulan",false],
["Nasi Goreng",false]
]
},

{
q:"2. Warna favorite Cecel?",
a:[
["Putih",false],
["Abu",false],
["Ungu","Wahh otaknya tuaa berapa GB ya kok inget? 😽💜"],
["Hitam",false]
]
},

{
q:"3. Hal yang paling disukai Cecel?",
a:[
["Matcha",false],
["Kucing",false],
["Dracin",false],
["Kamu","Ihhh tuaa pede bangettt yaa 😼"]
]
},

];

showQuestion();

function showQuestion(){

let q=quiz[nomor];

document.getElementById("question").innerHTML=q.q;

let ans=document.getElementById("answers");

ans.innerHTML="";

q.a.forEach(item=>{

let btn=document.createElement("button");

btn.className="option";

btn.innerHTML=item[0];

btn.onclick=function(){

if(item[1]==false){

alert("kok bisa salah sih ganteng 😾");

}else{

setTimeout(()=>{
alert(item[1]+" 💕");
},200);

nomor++;

if(nomor>=quiz.length){

document.getElementById("question").style.display="none";

document.getElementById("answers").style.display="none";

document.getElementById("finishBox").style.display="block";

}else{

showQuestion();

}

};

ans.appendChild(btn);

});

}

function selesai(){

window.location.href="transition.html";

}

</script>

<div style="position:fixed;top:20px;left:20px;font-size:25px;">🦋</div>
<div style="position:fixed;top:80px;right:30px;font-size:22px;">🌸</div>
<div style="position:fixed;bottom:30px;left:40px;font-size:20px;">🤍</div>
<div style="position:fixed;bottom:50px;right:40px;font-size:24px;">✨</div>

</body>
  
</html>
