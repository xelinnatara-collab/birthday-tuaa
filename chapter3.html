<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Letter For Tua</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#F6F1EE,#ECE2DD,#E5D7D0);
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;
}

.card{
width:100%;
max-width:820px;
background:white;
padding:45px;
border-radius:28px;
box-shadow:0 18px 40px rgba(109,41,50,.15);
animation:fadeCard 1s ease;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:45px;
text-align:center;
color:#5B2333;
margin-bottom:35px;
}

#typing{
font-size:18px;
line-height:2;
white-space:pre-wrap;
color:#4A3B39;
min-height:320px;
}

button{
display:block;
opacity:0;
pointer-events:none;
margin:40px auto 0;
padding:15px 38px;
border:none;
border-radius:40px;
background:#5B2333;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.35s;
}

button:hover{
background:#7A3046;
transform:translateY(-3px);
}

.fadeButton{
display:block;
opacity:1;
pointer-events:auto;
animation:fadeButton .8s ease forwards;
}

@keyframes fadeCard{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeButton{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<h1>🦋 A Letter For Tua 🦋</h1>

<div id="typing"></div>

<center>

<button id="nextBtn"
onclick="window.location.href='chapter4.html'">

Next ➜

</button>

</center>

</div>

<script>

const surat = `kalau ada yang tanya...

"ajam itu buat kamu siapa sih?"

aku bakal jawab...

dia orang baik.

dia ngajarin aku banyak hal tentang kehidupan.

dia orang yang paling ngerti aku.

dia pekerja keras.

dia ga gampang nyerah.

dia deket banget sama Allah.

dia gantenggg.

dan pastinya...

starboy. 😼✨

siapa sih yang dulu ga kenal anak starboy se-Depok?

eh...

sekarang udah bukan se-Depok lagi ya...

kayaknya udah se-Jawa Tengah. 🤣

tapi...

kalau ada yang nanya lebih dalam lagi tentang kamu...

aku bakal jawab...

buat aku...

kamu itu ibarat obat.

setiap aku lagi capek.

lagi sedih.

lagi banyak pikiran.

anehnya...

selalu aja ada kamu yang bikin semuanya pelan-pelan sembuh.

mungkin karena itu...

aku pernah ngerasa kalau semua luka yang aku punya...

obatnya selalu ada di kamu.

ada satu kalimat yang selalu aku inget.

"aku ibarat gunung tanpa pepohonan yang tetap berdiri, tetapi kehilangan bagian yang membuatku terasa hidup."

dan...

kalau disuruh menggambarkan kamu dalam satu kalimat...

aku bakal pilih ini.

"kamu adalah luka yang ga pernah bisa aku benci."

dan juga...

"kamu adalah luka yang selalu ingin aku peluk berkali-kali."

aneh ya?

padahal luka biasanya dihindari.

tapi entah kenapa...

kalau itu tentang kamu...

aku ga pernah benar-benar pengen menjauh.

karena sehadir-hadirnya seseorang di hidup aku...

tetep aja...

kamu punya tempat yang beda.

dan mungkin...

akan selalu begitu. 🤍`;

const text=document.getElementById("typing");
const nextBtn=document.getElementById("nextBtn");

let i=0;

function ketik(){

if(i<surat.length){

text.innerHTML+=surat.charAt(i);

i++;

setTimeout(ketik,55);

}else{

nextBtn.style.opacity="1";
nextBtn.style.pointerEvents="auto";
nextBtn.classList.add("fadeButton");

}

}

setTimeout(ketik,700);

</script>

</body>

</html>
