<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Tua</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

background:
linear-gradient(180deg,#FCF8F6,#F5ECE7,#ECDDD7);

font-family:'Poppins',sans-serif;

overflow-x:hidden;
overflow-y:auto;

min-height:100vh;

position:relative;

}

/* Background Glow */

body::before{

content:"";

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:750px;
height:750px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(109,41,50,.08),
transparent 70%);

filter:blur(35px);

animation:glow 8s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes glow{

from{

transform:translate(-50%,-50%) scale(.92);

}

to{

transform:translate(-50%,-50%) scale(1.08);

}

}

/* Container */

.container{

width:92%;
max-width:850px;

margin:auto;

padding:

70px
20px
120px;

text-align:center;

}

/* Title */

.title{

font-family:'Cormorant Garamond',serif;

font-size:54px;

color:#5C1F2B;

opacity:0;

transform:translateY(-25px);

animation:titleShow 1.6s forwards;

}

.title span{

display:block;

font-family:'Great Vibes',cursive;

font-size:86px;

margin-top:10px;

color:#6D2932;

}

.subtitle{

margin-top:18px;

font-size:22px;

color:#8A6A67;

line-height:1.8;

opacity:0;

animation:fade 2s forwards;

animation-delay:1.2s;

}

@keyframes titleShow{

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes fade{

to{

opacity:1;

}

}

/* Cake Section */

.cake-area{

margin-top:90px;

position:relative;

opacity:0;

transform:translateY(120px) scale(.9);

animation:cakeShow 2s forwards;

animation-delay:2.5s;

}

@keyframes cakeShow{

to{

opacity:1;

transform:translateY(0) scale(1);

}

}

/* Cake */

.cake{

position:relative;

width:320px;

height:360px;

margin:auto;

}

/* Bottom Layer */

.layer1{

position:absolute;

bottom:0;

width:320px;

height:82px;

background:#F3E5DE;

border-radius:24px;

box-shadow:0 14px 28px rgba(0,0,0,.10);

}

.layer1::before{

content:"";

position:absolute;

top:-12px;

width:100%;
height:22px;

background:white;

border-radius:20px;

}

/* Layer 2 */

.layer2{

position:absolute;

bottom:86px;

left:30px;

width:260px;

height:72px;

background:#EED6CD;

border-radius:22px;

box-shadow:0 10px 24px rgba(0,0,0,.08);

}

.layer2::before{

content:"";

position:absolute;

top:-10px;

width:100%;
height:20px;

background:white;

border-radius:18px;

}

/* Layer 3 */

.layer3{

position:absolute;

bottom:160px;

left:65px;

width:190px;

height:62px;

background:#E7C3BB;

border-radius:20px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.layer3::before{

content:"";

position:absolute;

top:-10px;

width:100%;
height:18px;

background:white;

border-radius:18px;

}

/* Top Layer */

.layer4{

position:absolute;

bottom:225px;

left:98px;

width:125px;

height:52px;

background:#DFA8A0;

border-radius:18px;

box-shadow:0 6px 18px rgba(0,0,0,.08);

}

.layer4::before{

content:"";

position:absolute;

top:-10px;

width:100%;
height:18px;

background:white;

border-radius:16px;

}

/* ========================= */
/* Ribbon */
/* ========================= */

.ribbon{

position:absolute;

left:50%;

transform:translateX(-50%);

bottom:95px;

width:20px;

height:120px;

background:linear-gradient(180deg,#7B2533,#5A1620);

border-radius:20px;

box-shadow:0 0 15px rgba(109,41,50,.25);

}

/* ========================= */
/* Pearls */
/* ========================= */

.pearl{

position:absolute;

width:8px;

height:8px;

background:white;

border-radius:50%;

box-shadow:0 0 6px rgba(255,255,255,.8);

}

.p1{left:25px;bottom:28px;}
.p2{left:70px;bottom:30px;}
.p3{left:115px;bottom:28px;}
.p4{left:160px;bottom:30px;}
.p5{left:205px;bottom:28px;}
.p6{left:250px;bottom:30px;}
.p7{left:295px;bottom:28px;}

/* ========================= */
/* Roses */
/* ========================= */

.rose{

position:absolute;

font-size:30px;

filter:drop-shadow(0 4px 6px rgba(0,0,0,.15));

}

.r1{

left:78px;

bottom:258px;

transform:rotate(-15deg);

}

.r2{

left:145px;

bottom:272px;

font-size:36px;

}

.r3{

left:212px;

bottom:258px;

transform:rotate(15deg);

}

/* ========================= */
/* Cake Text */
/* ========================= */

.cake-text{

position:absolute;

left:50%;

bottom:238px;

transform:translateX(-50%);

font-family:'Great Vibes',cursive;

font-size:20px;

color:#6D2932;

text-shadow:0 2px 5px rgba(255,255,255,.8);

}

/* ========================= */
/* Candles */
/* ========================= */

.candle{

position:absolute;

width:12px;

height:52px;

background:linear-gradient(180deg,#8B3140,#6D2932);

border-radius:10px;

bottom:276px;

}

.c1{left:78px;}
.c2{left:110px;}
.c3{left:146px;}
.c4{left:182px;}
.c5{left:214px;}

/* ========================= */
/* Flame */
/* ========================= */

.flame{

position:absolute;

top:-17px;

left:1px;

width:10px;

height:18px;

background:#FFD76A;

border-radius:50% 50% 45% 45%;

box-shadow:0 0 15px #FFD76A;

opacity:0;

}

@keyframes light{

to{

opacity:1;

}

}

.f1{

animation:light .5s forwards;

animation-delay:4.2s;

}

.f2{

animation:light .5s forwards;

animation-delay:4.7s;

}

.f3{

animation:light .5s forwards;

animation-delay:5.2s;

}

.f4{

animation:light .5s forwards;

animation-delay:5.7s;

}

.f5{

animation:light .5s forwards;

animation-delay:6.2s;

}

@keyframes flicker{

from{

transform:scale(.92);

}

to{

transform:scale(1.08);

}

}

.flame{

animation-name:light,flicker;

animation-duration:.5s,.8s;

animation-fill-mode:forwards;

animation-iteration-count:1,infinite;

animation-direction:normal,alternate;

}

/* ========================= */
/* Make A Wish */
/* ========================= */

.wish{

margin-top:65px;

font-family:'Great Vibes',cursive;

font-size:42px;

color:#6D2932;

opacity:0;

animation:fade 2s forwards;

animation-delay:7.5s;

}

/* ========================= */
/* Button */
/* ========================= */

.next{

margin-top:30px;

padding:18px 44px;

border:none;

border-radius:50px;

background:#6D2932;

color:#fff;

font-size:18px;

font-weight:500;

cursor:pointer;

box-shadow:0 12px 28px rgba(109,41,50,.25);

opacity:0;

pointer-events:none;

transition:.35s;

}

.next.show{

opacity:1;

pointer-events:auto;

}

.next:hover{

transform:translateY(-3px);

background:#7B3440;

  }

 </style>

</head>

<body>

<div class="container">

<h1 class="title">
Happy
<span>19th Birthday, Tua</span>
</h1>

<p class="subtitle">
May every prayer always find its way to you.<br>
Thank you for becoming someone so precious in my life. 🤍
</p>

<div class="cake-area">

<div class="cake">

<div class="layer1"></div>
<div class="layer2"></div>
<div class="layer3"></div>
<div class="layer4"></div>

<div class="ribbon"></div>

<div class="pearl p1"></div>
<div class="pearl p2"></div>
<div class="pearl p3"></div>
<div class="pearl p4"></div>
<div class="pearl p5"></div>
<div class="pearl p6"></div>
<div class="pearl p7"></div>

<div class="rose r1">🌹</div>
<div class="rose r2">🌹</div>
<div class="rose r3">🌹</div>

<div class="cake-text">
Happy Birthday 🤍
</div>

<div class="candle c1"><div class="flame f1"></div></div>
<div class="candle c2"><div class="flame f2"></div></div>
<div class="candle c3"><div class="flame f3"></div></div>
<div class="candle c4"><div class="flame f4"></div></div>
<div class="candle c5"><div class="flame f5"></div></div>

</div>

</div>

<div class="wish">
Make a wish... ✨
</div>

<button class="next" id="nextBtn">
Open My Last Letter 🤍
</button>

</div>

<script>

/* ===========================
   Confetti
=========================== */

function confetti(){

const c=document.createElement("div");

const colors=[
"#6D2932",
"#EBC8C2",
"#FFFFFF",
"#F7D6D0"
];

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-30px";
c.style.width=(6+Math.random()*6)+"px";
c.style.height=(10+Math.random()*10)+"px";
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.borderRadius="3px";
c.style.pointerEvents="none";
c.style.zIndex="0";

document.body.appendChild(c);

let y=-30;
let x=parseFloat(c.style.left);
let drift=(Math.random()*2)-1;

const fall=setInterval(()=>{

y+=3;
x+=drift;

c.style.top=y+"px";
c.style.left=x+"px";

if(y>window.innerHeight+40){

clearInterval(fall);
c.remove();

}

},20);

}

const confettiLoop=setInterval(confetti,90);

setTimeout(()=>{

clearInterval(confettiLoop);

},4500);

/* ===========================
   Rose Petals
=========================== */

function petal(){

const p=document.createElement("div");

p.innerHTML=Math.random()>.5?"🌹":"🌸";

p.style.position="fixed";
p.style.left=Math.random()*100+"vw";
p.style.top="-40px";
p.style.fontSize=(18+Math.random()*14)+"px";
p.style.pointerEvents="none";
p.style.zIndex="0";

document.body.appendChild(p);

let y=-40;
let x=parseFloat(p.style.left);

const fall=setInterval(()=>{

y+=2;
x+=Math.random()*1.4-.7;

p.style.top=y+"px";
p.style.left=x+"px";

if(y>window.innerHeight+60){

clearInterval(fall);
p.remove();

}

},20);

}

setTimeout(()=>{

setInterval(petal,700);

},4500);

/* ===========================
   Button
=========================== */

setTimeout(()=>{

document.getElementById("nextBtn").classList.add("show");

},8200);

/* ===========================
   Next Page
=========================== */

document.getElementById("nextBtn").onclick=function(){

document.body.style.transition="opacity 1.5s ease";

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="end.html";

},1500);

}

</script>

</body>
</html>
