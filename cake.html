<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Tua</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(
180deg,
#FCF8F6,
#F6EEEA,
#EADDD7
);

overflow-x:hidden;
overflow-y:auto;

min-height:100vh;

position:relative;

}

/* ==========================
BACKGROUND GLOW
========================== */

body::before{

content:"";

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:780px;
height:780px;

border-radius:50%;

background:radial-gradient(
circle,
rgba(109,41,50,.08),
transparent 70%
);

filter:blur(45px);

animation:glow 8s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes glow{

from{

transform:
translate(-50%,-50%)
scale(.92);

}

to{

transform:
translate(-50%,-50%)
scale(1.08);

}

}

/* ==========================
CONTAINER
========================== */

.container{

width:92%;
max-width:900px;

margin:auto;

padding:
70px
20px
120px;

text-align:center;

}

/* ==========================
TITLE
========================== */

.title{

font-family:'Cormorant Garamond',serif;

font-size:62px;

font-weight:700;

line-height:1.1;

color:#6D2932;

text-shadow:
0 4px 10px rgba(109,41,50,.08);

opacity:0;

transform:translateY(-25px);

animation:titleShow 1.6s forwards;

}

.title span{

display:block;

font-size:74px;

margin-top:8px;

}

.subtitle{

margin-top:20px;

font-size:22px;

line-height:1.8;

color:#8A6A67;

opacity:0;

animation:fade 2s forwards;

animation-delay:1.2s;

}

@keyframes titleShow{

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes fade{

to{

opacity:1;

}

}

/* ==========================
CAKE AREA
========================== */

.cake-area{

margin-top:45px;

display:flex;

justify-content:center;

opacity:0;

transform:translateY(60px);

animation:cakeShow 1.8s forwards;

animation-delay:2.4s;

}

@keyframes cakeShow{

to{

opacity:1;

transform:translateY(0);

}

}

/* ==========================
CAKE
========================== */

.cake{

position:relative;

width:380px;

height:430px;

display:flex;

justify-content:center;

align-items:flex-end;

}

/* ==========================
CAKE LAYERS
========================== */

.layer{
position:absolute;
left:50%;
transform:translateX(-50%);
}

/* Layer 1 */

.layer1{

bottom:0;

width:330px;
height:90px;

background:#F3E4DF;

border-radius:26px;

box-shadow:
0 15px 28px rgba(0,0,0,.10),
0 0 30px rgba(255,255,255,.5);

}

.layer1::before{

content:"";

position:absolute;

left:16px;
top:-12px;

width:298px;
height:22px;

background:white;

border-radius:26px;

}

/* Layer 2 */

.layer2{

bottom:94px;

width:255px;
height:76px;

background:#EECFC8;

border-radius:24px;

box-shadow:
0 12px 22px rgba(0,0,0,.08);

}

.layer2::before{

content:"";

position:absolute;

left:14px;
top:-10px;

width:227px;
height:18px;

background:white;

border-radius:20px;

}

/* Layer 3 */

.layer3{

bottom:174px;

width:185px;
height:66px;

background:#E6BBB2;

border-radius:22px;

box-shadow:
0 10px 18px rgba(0,0,0,.08);

}

.layer3::before{

content:"";

position:absolute;

left:12px;
top:-10px;

width:161px;
height:18px;

background:white;

border-radius:18px;

}

/* Layer 4 */

.layer4{

bottom:245px;

width:145px;
height:58px;

background:#DFA8A0;

border-radius:20px;

box-shadow:
0 8px 18px rgba(0,0,0,.08);

}

.layer4::before{

content:"";

position:absolute;

left:10px;
top:-10px;

width:125px;
height:18px;

background:white;

border-radius:18px;

}

/* ==========================
RIBBON
========================== */

.ribbon{

position:absolute;

left:50%;

transform:translateX(-50%);

bottom:100px;

width:28px;

height:128px;

background:linear-gradient(
180deg,
#7A3140,
#5E202B
);

border-radius:30px;

box-shadow:
0 8px 20px rgba(109,41,50,.25);

}

/* ==========================
PEARLS
========================== */

.pearl{

position:absolute;

width:8px;
height:8px;

background:white;

border-radius:50%;

box-shadow:
0 0 8px rgba(255,255,255,.9);

}

.p1{left:28px;bottom:32px;}
.p2{left:74px;bottom:30px;}
.p3{left:120px;bottom:32px;}
.p4{left:166px;bottom:30px;}
.p5{left:212px;bottom:32px;}
.p6{left:258px;bottom:30px;}
.p7{left:304px;bottom:32px;}

/* ==========================
ROSES
========================== */

.rose{

position:absolute;

filter:drop-shadow(0 5px 8px rgba(0,0,0,.18));

animation:roseFloat 3s ease-in-out infinite;

}

.r1{

left:82px;

bottom:292px;

font-size:30px;

}

.r2{

left:170px;

bottom:310px;

font-size:36px;

}

.r3{

left:258px;

bottom:292px;

font-size:30px;

}

@keyframes roseFloat{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-4px);
}

100%{
transform:translateY(0);
}

}

/* ==========================
CAKE TEXT
========================== */

.cake-text{

position:absolute;

left:53%;

transform:translateX(-50%);

bottom:265px;

font-family:'Great Vibes',cursive;

font-size:19px;

color:#6D2932;

white-space:nowrap;

text-shadow:
0 2px 6px rgba(255,255,255,.9);

}

/* ==========================
CANDLES
========================== */

.candle{

position:absolute;

bottom:308px;

width:16px;
height:60px;

border-radius:12px;

background:linear-gradient(
180deg,
#8B3A48,
#61212C
);

box-shadow:
0 6px 14px rgba(0,0,0,.15);

}

.c1{left:130px;}
.c3{left:180px;}
.c5{left:230px;}

/* ==========================
FLAME
========================== */

.flame{

position:absolute;

left:50%;

top:-24px;

transform:translateX(-50%);

width:14px;
height:24px;

border-radius:50% 50% 45% 45%;

background:radial-gradient(
circle,
#FFF8BE 10%,
#FFD86C 45%,
#FFAE42 100%
);

box-shadow:
0 0 10px #FFD66A,
0 0 18px rgba(255,214,106,.8),
0 0 34px rgba(255,214,106,.45);

opacity:0;

}

@keyframes light{

to{
opacity:1;
}

}

@keyframes flicker{

0%{
transform:translateX(-50%) scale(.92) rotate(-2deg);
}

50%{
transform:translateX(-50%) scale(1.08) rotate(2deg);
}

100%{
transform:translateX(-50%) scale(.96) rotate(-1deg);
}

}

.f1{
animation:light .5s forwards 4.2s,
flicker .8s infinite alternate 4.7s;
}

.f2{
animation:light .5s forwards 4.8s,
flicker .8s infinite alternate 5.3s;
}

.f3{
animation:light .5s forwards 5.4s,
flicker .8s infinite alternate 5.9s;
}

.f4{
animation:light .5s forwards 6.0s,
flicker .8s infinite alternate 6.5s;
}

.f5{
animation:light .5s forwards 6.6s,
flicker .8s infinite alternate 7.1s;
}

/* ==========================
MAKE A WISH
========================== */

.wish{

margin-top:70px;

font-family:'Great Vibes',cursive;

font-size:46px;

color:#6D2932;

opacity:0;

animation:fade 2s forwards;

animation-delay:7.8s;

}

/* ==========================
BUTTON
========================== */

.next{

margin-top:35px;

padding:18px 46px;

border:none;

border-radius:50px;

background:#6D2932;

color:white;

font-size:18px;

font-weight:500;

cursor:pointer;

opacity:0;

pointer-events:none;

box-shadow:
0 12px 30px rgba(109,41,50,.25);

transition:.35s;

}

.next.show{

opacity:1;

pointer-events:auto;

}

.next:hover{

background:#7C3642;

transform:translateY(-3px);

}

/* ==========================
RESPONSIVE
========================== */

@media(max-width:480px){

.title{
font-size:48px;
}

.title span{
font-size:58px;
}

.subtitle{
font-size:18px;
}

.cake{
transform:scale(.83);
}

.wish{
font-size:38px;
}

}

</style>

</head>

<body>

<div class="container">

<h1 class="title">
Happy
<span>19th Birthday, Tua</span>
</h1>

<p class="subtitle">
May every prayer always find its way to you.<br>
Thank you for becoming someone so precious in my life. 🤍
</p>

<div class="cake-area">

<div class="cake">

<!-- Cake -->
<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>
<div class="layer layer4"></div>

<!-- Ribbon -->
<div class="ribbon"></div>

<!-- Pearls -->
<div class="pearl p1"></div>
<div class="pearl p2"></div>
<div class="pearl p3"></div>
<div class="pearl p4"></div>
<div class="pearl p5"></div>
<div class="pearl p6"></div>
<div class="pearl p7"></div>

<!-- Roses -->
<div class="rose r1">🌹</div>
<div class="rose r2">🌹</div>
<div class="rose r3">🌹</div>

<!-- Cake Text -->
<div class="cake-text">
Happy Birthday 🤍
</div>

<!-- Candles -->
<div class="candle c1">
<div class="flame f1"></div>
</div>

<div class="candle c3">
<div class="flame f3"></div>
</div>

<div class="candle c5">
<div class="flame f5"></div>
</div>

</div>

</div>

<div class="wish">
Make a wish... ✨
</div>

<button class="next" id="nextBtn">
Open My Last Letter 🤍
</button>

</div>

<script>

/* ===========================
CONFETTI
=========================== */

function createConfetti(){

const item=document.createElement("div");

item.innerHTML=["🤍","✨","🌸","🌹"][Math.floor(Math.random()*4)];

item.style.position="fixed";
item.style.left=Math.random()*100+"vw";
item.style.top="-40px";
item.style.fontSize=(16+Math.random()*16)+"px";
item.style.pointerEvents="none";
item.style.zIndex="999";

document.body.appendChild(item);

let y=-40;
let x=Math.random()*window.innerWidth;
let speed=2+Math.random()*2;
let drift=(Math.random()-.5)*2;

const fall=setInterval(()=>{

y+=speed;
x+=drift;

item.style.top=y+"px";
item.style.left=x+"px";
item.style.transform=`rotate(${y}deg)`;

if(y>window.innerHeight+60){

clearInterval(fall);
item.remove();

}

},20);

}

const confettiLoop=setInterval(createConfetti,120);

setTimeout(()=>{

clearInterval(confettiLoop);

},5000);

/* ===========================
FLOWERS
=========================== */

function flower(){

const p=document.createElement("div");

p.innerHTML=Math.random()>.5?"🌹":"🌸";

p.style.position="fixed";
p.style.left=Math.random()*100+"vw";
p.style.top="-40px";
p.style.fontSize=(18+Math.random()*10)+"px";
p.style.pointerEvents="none";
p.style.zIndex="998";

document.body.appendChild(p);

let y=-40;
let x=Math.random()*window.innerWidth;
let drift=(Math.random()-.5)*1.6;

const fall=setInterval(()=>{

y+=2;
x+=drift;

p.style.top=y+"px";
p.style.left=x+"px";

if(y>window.innerHeight+60){

clearInterval(fall);
p.remove();

}

},20);

}

setTimeout(()=>{

setInterval(flower,800);

},5000);

/* ===========================
SHOW BUTTON
=========================== */

setTimeout(()=>{

document.getElementById("nextBtn").classList.add("show");

},8500);

/* ===========================
NEXT PAGE
=========================== */

document.getElementById("nextBtn").onclick=function(){

document.body.style.transition="opacity 1.3s ease";

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="yourturn.html";

},1300);

};

</script>

</body>
</html>
