<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#ffe6f2,#fff,#ffeef7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
padding:30px;
}

h1{
color:#ff5c9f;
font-size:40px;
}

p{
color:#666;
font-size:18px;
}

.cake{
font-size:150px;
animation:bounce 1.5s infinite;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff5c9f;
color:white;
font-size:18px;
cursor:pointer;
}

@keyframes bounce{

0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}

}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Tua 🎉</h1>

<div class="cake">🎂</div>

<p>

Semoga semua doa baik selalu menyertaimu.<br>
Terima kasih sudah hadir di hidupku. 🤍

</p>

<button onclick="location.href='end.html'">

Open The Last Surprise 🤍

</button>

</div>

</body>
</html>
