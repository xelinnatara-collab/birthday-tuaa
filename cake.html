<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  
<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#F6F1EE,#ECE2DD,#E5D7D0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
padding:30px;
}

h1{
font-family:'Cormorant Garamond',serif;  
color:#6D2932
font-size:40px;
}

p{
color:#666;
font-size:18px;
}

.cake{
font-size:150px;
animation:bounce 1.5s infinite;
}

button{
display:none;
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#6D2932;
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 18px rgba(109,41,50,.25);
}

@keyframes bounce{

0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}

}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Tua 🎉</h1>

<div class="cake">🎂</div>

<p>

Semoga semua doa baik selalu menyertaimu.<br>
Terima kasih sudah hadir di hidupku. 🤍

</p>

<button onclick="location.href='end.html'">

Open The Last Surprise ☁️

</button>

</div>

</body>
</html>
