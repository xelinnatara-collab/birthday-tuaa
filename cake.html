<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Birthday Cake</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

background:linear-gradient(135deg,#F8F3F0,#F2E8E3,#E9DDD8);

overflow:hidden;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:'Poppins',sans-serif;

position:relative;

}

/* Background Glow */

body::before{

content:"";

position:absolute;

width:700px;

height:700px;

border-radius:50%;

background:radial-gradient(circle,

rgba(109,41,50,.08),

transparent 70%);

filter:blur(30px);

animation:glow 7s ease-in-out infinite alternate;

}

/* Main Card */

.container{

position:relative;

z-index:5;

width:92%;

max-width:750px;

text-align:center;

}

/* Title */

.title{

font-family:'Cormorant Garamond',serif;

font-size:68px;

font-weight:700;

color:#6D2932;

opacity:0;

transform:translateY(-25px);

animation:titleShow 1.8s forwards;

}

.title span{

display:block;

font-size:78px;

}

/* Message */

.message{

margin-top:25px;

font-size:22px;

line-height:1.8;

color:#7B6663;

opacity:0;

animation:fadeIn 2s forwards;

animation-delay:1.4s;

}

/* Cake Area */

.cake-area{

margin-top:70px;

opacity:0;

transform:translateY(120px);

animation:cakeUp 2s forwards;

animation-delay:2.8s;

}

/* Button */

.next{

margin-top:60px;

padding:16px 42px;

border:none;

border-radius:40px;

background:#6D2932;

color:white;

font-size:18px;

font-weight:600;

cursor:pointer;

opacity:0;

pointer-events:none;

transition:.4s;

box-shadow:0 12px 30px rgba(109,41,50,.22);

}

.next.show{

opacity:1;

pointer-events:auto;

}

.next:hover{

transform:translateY(-3px);

background:#7E3642;

}

/* Animation */

@keyframes glow{

from{

transform:scale(.95);

}

to{

transform:scale(1.08);

}

}

@keyframes titleShow{

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes fadeIn{

to{

opacity:1;

}

}

@keyframes cakeUp{

to{

opacity:1;

transform:translateY(0);

}

}

}

/* ========================= */
/* Three Layer Cake */
/* ========================= */

.cake{

position:relative;

width:260px;

height:240px;

margin:auto;

}

/* Bottom */

.layer1{

width:260px;

height:70px;

background:#F4E6DF;

border-radius:18px;

position:absolute;

bottom:0;

left:0;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.layer1::before{

content:"";

position:absolute;

top:-12px;

left:0;

width:100%;

height:22px;

background:white;

border-radius:18px;

}

/* Middle */

.layer2{

width:190px;

height:58px;

background:#EFD5CB;

border-radius:18px;

position:absolute;

bottom:72px;

left:35px;

box-shadow:0 8px 18px rgba(0,0,0,.08);

}

.layer2::before{

content:"";

position:absolute;

top:-10px;

left:0;

width:100%;

height:18px;

background:white;

border-radius:18px;

}

/* Top */

.layer3{

width:120px;

height:48px;

background:#E8C0B8;

border-radius:18px;

position:absolute;

bottom:132px;

left:70px;

box-shadow:0 8px 15px rgba(0,0,0,.08);

}

.layer3::before{

content:"";

position:absolute;

top:-10px;

left:0;

width:100%;

height:18px;

background:white;

border-radius:18px;

}

/* Maroon Ribbon */

.ribbon{

position:absolute;

left:50%;

transform:translateX(-50%);

bottom:92px;

width:18px;

height:86px;

background:#6D2932;

border-radius:20px;

}

/* Candles */

.candle{

position:absolute;

width:12px;

height:45px;

background:#6D2932;

border-radius:10px;

bottom:176px;

}

.c1{

left:88px;

}

.c2{

left:124px;

}

.c3{

left:160px;

}

/* Flame */

.flame{

position:absolute;

width:12px;

height:18px;

background:#FFD56A;

border-radius:50% 50% 45% 45%;

top:-16px;

left:0;

animation:flicker .8s infinite alternate;

box-shadow:0 0 12px #FFD56A;

}

@keyframes flicker{

from{

transform:scale(.9);

opacity:.85;

}

to{

transform:scale(1.1);

opacity:1;

}

}

</style>

</head>

<body>

<div class="container">

<h1 class="title">

🎉 Happy

<span>Birthday, Tua</span>

</h1>

<p class="message">

May every prayer always find its way to you.<br>

Thank you for becoming someone so precious in my life. 🤍

</p>

<div class="cake-area">

<div class="cake">

<div class="layer1"></div>

<div class="layer2"></div>

<div class="layer3"></div>

<div class="ribbon"></div>

<div class="candle c1"><div class="flame"></div></div>

<div class="candle c2"><div class="flame"></div></div>

<div class="candle c3"><div class="flame"></div></div>

</div>

</div>

<button class="next" id="nextBtn">

Open Final Letter 🤍

</button>

<script>

/* ========================= */
/* Confetti (5 detik) */
/* ========================= */

function createConfetti(){

const c=document.createElement("div");

const colors=["#6D2932","#C78A8A","#F6E7E2","#FFFFFF"];

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-20px";

c.style.width=(6+Math.random()*6)+"px";

c.style.height=(10+Math.random()*10)+"px";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.borderRadius="3px";

c.style.pointerEvents="none";

c.style.zIndex="1";

document.body.appendChild(c);

let y=-20;

let x=parseFloat(c.style.left);

let rotate=Math.random()*360;

let drift=(Math.random()*2)-1;

const fall=setInterval(()=>{

y+=3;

x+=drift;

rotate+=5;

c.style.top=y+"px";

c.style.left=x+"px";

c.style.transform=`rotate(${rotate}deg)`;

if(y>window.innerHeight+30){

clearInterval(fall);

c.remove();

}

},20);

}

const confetti=setInterval(createConfetti,90);

/* Berhenti setelah 5 detik */

setTimeout(()=>{

clearInterval(confetti);

},5000);

/* ========================= */
/* Hati & Sakura */
/* ========================= */

function createFlower(){

const f=document.createElement("div");

const items=["🤍","🌸"];

f.innerHTML=items[Math.floor(Math.random()*items.length)];

f.style.position="fixed";

f.style.left=Math.random()*100+"vw";

f.style.top="-30px";

f.style.fontSize=(18+Math.random()*10)+"px";

f.style.pointerEvents="none";

f.style.zIndex="0";

document.body.appendChild(f);

let y=-30;

let x=parseFloat(f.style.left);

let drift=(Math.random()*2)-1;

let rotate=Math.random()*360;

const fall=setInterval(()=>{

y+=1.8;

x+=drift;

rotate+=1.2;

f.style.top=y+"px";

f.style.left=x+"px";

f.style.transform=`rotate(${rotate}deg)`;

if(y>window.innerHeight+40){

clearInterval(fall);

f.remove();

}

},20);

}

/* Mulai setelah confetti selesai */

setTimeout(()=>{

setInterval(createFlower,800);

},5000);

/* ========================= */
/* Tombol muncul */
/* ========================= */

setTimeout(()=>{

document.getElementById("nextBtn").classList.add("show");

},5200);

/* ========================= */
/* Pindah ke end.html */
/* ========================= */

document.getElementById("nextBtn").onclick=function(){

document.body.style.transition="opacity 1.3s ease";

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="end.html";

},1300);

};

</script>

</body>

</html>
