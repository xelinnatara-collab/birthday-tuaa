<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catch My Heart</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

min-height:100vh;

overflow-x:hidden;
overflow-y:auto;

font-family:'Poppins',sans-serif;

background:
linear-gradient(135deg,
#FCF8F6,
#F4EAE6,
#EAD9D4);

position:relative;

}

/* Background Glow */

body::before{

content:"";

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:700px;
height:700px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(109,41,50,.08),
transparent 70%);

filter:blur(35px);

animation:glow 8s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes glow{

from{

transform:translate(-50%,-50%) scale(.92);

}

to{

transform:translate(-50%,-50%) scale(1.08);

}

}

/* Game Area */

#game{

position:relative;

min-height:100vh;

overflow:hidden;

padding-bottom:180px;

}

/* Sparkle */

.sparkle{

position:absolute;

width:4px;
height:4px;

border-radius:50%;

background:white;

opacity:.7;

animation:blink 2.5s infinite;

}

@keyframes blink{

0%,100%{

opacity:.25;
transform:scale(.8);

}

50%{

opacity:1;
transform:scale(1.4);

}

}

/* Title */

.title{

margin-top:35px;

text-align:center;

padding:0 20px;

}

.title h1{

font-family:'Cormorant Garamond',serif;

font-size:54px;

color:#6D2932;

}

.title p{

margin-top:12px;

font-size:17px;

color:#8A6A67;

line-height:1.7;

}

/* Love Meter */

.meter{

margin:40px auto 0;

width:90%;
max-width:380px;

}

.score{

text-align:center;

font-weight:600;

color:#6D2932;

margin-bottom:15px;

font-size:18px;

}

.bar{

height:18px;

background:#E7D8D5;

border-radius:40px;

overflow:hidden;

box-shadow:
inset 0 0 8px rgba(0,0,0,.08);

}

.fill{

height:100%;

width:0%;

background:
linear-gradient(90deg,
#6D2932,
#9A4B59);

transition:.25s;

}

/* Gift */

#basket{

position:fixed;

bottom:30px;

left:50%;

transform:translateX(-50%);

font-size:64px;

transition:left .05s linear;

z-index:999;

filter:
drop-shadow(0 10px 12px rgba(0,0,0,.15));

}

/* Falling Item */

.item{

position:absolute;

font-size:38px;

pointer-events:none;

animation:float 2s ease-in-out infinite;

}

@keyframes float{

0%{

transform:translateY(0) rotate(0);

}

50%{

transform:translateY(-8px) rotate(8deg);

}

100%{

transform:translateY(0) rotate(0);

}

}

/* ========================= */
/* Popup Score */
/* ========================= */

.popup{

position:absolute;

font-size:22px;

font-weight:700;

pointer-events:none;

animation:pop .9s forwards;

}

@keyframes pop{

0%{

opacity:1;

transform:translateY(0) scale(.8);

}

100%{

opacity:0;

transform:translateY(-70px) scale(1.15);

}

}

/* ========================= */
/* Finish Popup */
/* ========================= */

#finish{

display:none;

position:fixed;

left:50%;

top:50%;

transform:translate(-50%,-50%) scale(.85);

width:92%;
max-width:430px;

padding:40px 30px;

background:rgba(255,255,255,.95);

backdrop-filter:blur(14px);

border-radius:28px;

box-shadow:
0 20px 45px rgba(109,41,50,.18);

text-align:center;

z-index:9999;

opacity:0;

transition:.45s;

}

#finish.show{

display:block;

opacity:1;

transform:translate(-50%,-50%) scale(1);

}

#finish h2{

font-family:'Great Vibes',cursive;

font-size:58px;

color:#6D2932;

margin-bottom:12px;

}

#finish p{

font-size:17px;

line-height:1.9;

color:#6B5C59;

margin-bottom:28px;

}

#finish button{

padding:16px 42px;

border:none;

border-radius:50px;

background:#6D2932;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.35s;

box-shadow:
0 12px 26px rgba(109,41,50,.25);

}

#finish button:hover{

background:#83414C;

transform:translateY(-3px);

}

/* ========================= */
/* Bounce Gift */
/* ========================= */

@keyframes basketBounce{

0%{

transform:translateX(-50%) scale(1);

}

50%{

transform:translateX(-50%) scale(1.12);

}

100%{

transform:translateX(-50%) scale(1);

}

}

.bounce{

animation:basketBounce .7s;

}

/* ========================= */
/* HTML */
/* ========================= */

</style>

</head>

<body>

<div id="game">

<div class="title">

<h1>🤍 Catch My Heart 🤍</h1>

<p>

Catch every little heart from Cecel,<br>

then continue our story together. 🌹

</p>

</div>

<div class="meter">

<div class="score">

Love Meter 🤍

<br>

<span id="angka">

0 / 20

</span>

</div>

<div class="bar">

<div class="fill" id="fill"></div>

</div>

</div>

<div id="basket">

🎁

</div>

<div id="finish">

<h2>

Yayyy!! 🤍

</h2>

<p>

You caught every little piece of Cecel's heart.

Thank you for staying until this chapter.

Now...

there's one last thing waiting for you. 🌹

</p>

<button id="nextBtn">

Continue Our Story ➜

</button>

</div>

<script>

const game=document.getElementById("game");
const basket=document.getElementById("basket");
const fill=document.getElementById("fill");
const angka=document.getElementById("angka");
const finish=document.getElementById("finish");
const nextBtn=document.getElementById("nextBtn");

let score=0;
const target=20;

let basketX=window.innerWidth/2;
let gameFinished=false;

/* ===========================
   Sparkle Background
=========================== */

for(let i=0;i<40;i++){

const s=document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=Math.random()*window.innerHeight+"px";
s.style.animationDelay=Math.random()*3+"s";

game.appendChild(s);

}

/* ===========================
   Gift Movement
=========================== */

document.addEventListener("mousemove",(e)=>{

basketX=e.clientX;
basket.style.left=basketX+"px";

});

document.addEventListener("touchmove",(e)=>{

basketX=e.touches[0].clientX;
basket.style.left=basketX+"px";

});

/* ===========================
   Score Popup
=========================== */

function popup(text,x,y,color){

const p=document.createElement("div");

p.className="popup";

p.innerHTML=text;

p.style.left=x+"px";
p.style.top=y+"px";
p.style.color=color;

game.appendChild(p);

setTimeout(()=>{

p.remove();

},900);

}

/* ===========================
   Falling Items
=========================== */

const rain=setInterval(createItem,650);

function createItem(){

if(gameFinished) return;

const item=document.createElement("div");

item.className="item";

let type="heart";

const r=Math.random();

if(r<0.15){

type="bomb";

}else if(r>0.88){

type="gold";

}

if(type=="heart") item.innerHTML="❤️";
if(type=="gold") item.innerHTML="💖";
if(type=="bomb") item.innerHTML="💣";

item.style.left=Math.random()*(window.innerWidth-50)+"px";
item.style.top="-50px";

game.appendChild(item);

let y=-50;

const fall=setInterval(()=>{

if(gameFinished){

clearInterval(fall);
item.remove();
return;

}

y+=5;

item.style.top=y+"px";

const b=basket.getBoundingClientRect();
const i=item.getBoundingClientRect();

if(
i.bottom>=b.top &&
i.left<b.right &&
i.right>b.left
){

clearInterval(fall);

item.remove();

if(type=="heart"){

score++;
popup("+1 ❤️",basketX,window.innerHeight-120,"#6D2932");

}

if(type=="gold"){

score+=3;
popup("+3 💖",basketX,window.innerHeight-120,"#C2185B");

}

if(type=="bomb"){

score=Math.max(0,score-2);
popup("-2 💣",basketX,window.innerHeight-120,"#B22222");

}

fill.style.width=(score/target*100)+"%";

angka.innerHTML=score+" / "+target;

basket.classList.add("bounce");

setTimeout(()=>{

basket.classList.remove("bounce");

},500);

if(score>=target){

winGame();

}

}

if(y>window.innerHeight){

clearInterval(fall);
item.remove();

}

},20);

}

/* ===========================
   Win
=========================== */

function winGame(){

if(gameFinished) return;

gameFinished=true;

clearInterval(rain);

confetti();

finish.classList.add("show");

}

/* ===========================
   Confetti
=========================== */

function confetti(){

for(let i=0;i<120;i++){

const c=document.createElement("div");

c.innerHTML=["🤍","❤️","🌸","✨","🌹"][Math.floor(Math.random()*5)];

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-40px";
c.style.fontSize=(18+Math.random()*18)+"px";
c.style.pointerEvents="none";

document.body.appendChild(c);

let y=-40;
let x=parseFloat(c.style.left);

const fall=setInterval(()=>{

y+=4;
x+=Math.random()*2-1;

c.style.top=y+"px";
c.style.left=x+"px";
c.style.transform=`rotate(${y}deg)`;

if(y>window.innerHeight){

clearInterval(fall);
c.remove();

}

},20);

}

}

/* ===========================
   Next Page
=========================== */

nextBtn.onclick=function(){

document.body.style.transition="opacity 1.2s ease";
document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="memory.html";

},1200);

};

</script>

</body>
</html>
