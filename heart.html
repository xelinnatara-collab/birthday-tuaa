<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fill My Heart</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  
<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#F6F1EE,#ECE2DD,#E5D7D0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
 line-height:1.7;
letter-spacing:.3px; 
}

.container{
background:white;
padding:40px;
border-radius:24px;
box-shadow:0 12px 30px rgba(109,41,50,.15);
width:90%;
max-width:500px;
}

#heart{
font-size:90px;
cursor:pointer;
transition:.3s;
}

#heart:hover{
transform:scale(1.1);
}

h2{
color:#6D2932
}

button{
display:none;
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#6D2932;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 18px rgba(109,41,50,.25);
}

</style>

</head>

<body>

<div class="container">

<h2>❤️ Fill My Heart ❤️</h2>

<p>Klik hati ini sampai penuh yaa maksaa bangett 🤍</p>

<div id="heart" onclick="love()">🤍</div>

<p id="text">0 / 5</p>

<button id="next" onclick="location.href='cake.html'">

Birthday Cake 🎂

</button>

</div>

<script>

let count=0;

const hearts=["🤍","💗","❤️","💖","💕"];

function love(){

if(count<5){

document.getElementById("heart").innerHTML=hearts[count];

count++;

document.getElementById("text").innerHTML=count+" / 5";

}

if(count==5){

document.getElementById("text").innerHTML="🦋 Makasih yaa udah sampai di sini.";

document.getElementById("next").style.display="inline-block";

}

}

</script>

</body>
</html>
