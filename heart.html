<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Catch My Heart</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;

height:100vh;

font-family:'Poppins',sans-serif;

background:
linear-gradient(135deg,#FCF8F6,#F3E7E2,#E7D6D0);

position:relative;

}

/* Glow */

body::before{

content:"";

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:700px;
height:700px;

border-radius:50%;

background:

radial-gradient(circle,
rgba(109,41,50,.08),
transparent 70%);

filter:blur(35px);

animation:glow 8s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes glow{

from{

transform:translate(-50%,-50%) scale(.92);

}

to{

transform:translate(-50%,-50%) scale(1.08);

}

}

/* ========================= */

#game{

position:relative;

width:100vw;
height:100vh;

overflow:hidden;

}

/* ========================= */

.title{

text-align:center;

padding-top:35px;

}

.title h1{

font-family:'Cormorant Garamond',serif;

font-size:56px;

color:#6D2932;

}

.title p{

margin-top:10px;

color:#8A6A67;

font-size:17px;

line-height:1.8;

}

/* ========================= */

.meter{

width:340px;

margin:35px auto 0;

}

.score{

text-align:center;

font-weight:600;

font-size:18px;

color:#6D2932;

margin-bottom:12px;

}

.bar{

height:18px;

background:#E8D9D6;

border-radius:40px;

overflow:hidden;

box-shadow:inset 0 0 8px rgba(0,0,0,.08);

}

.fill{

height:100%;

width:0%;

border-radius:40px;

background:

linear-gradient(90deg,#6D2932,#9A4B59);

transition:.3s;

}

/* ========================= */

#basket{

position:fixed;

bottom:25px;

left:50%;

font-size:65px;

z-index:999;

user-select:none;

transition:transform .15s;

filter:drop-shadow(0 10px 12px rgba(0,0,0,.18));

}

/* ========================= */

.item{

position:absolute;

font-size:38px;

pointer-events:none;

user-select:none;

}

/* ========================= */

.popup{

position:absolute;

font-weight:700;

font-size:22px;

pointer-events:none;

animation:popup .8s forwards;

}

@keyframes popup{

0%{

opacity:1;

transform:translateY(0) scale(.8);

}

100%{

opacity:0;

transform:translateY(-70px) scale(1.2);

}

}

/* ========================= */

@keyframes bounce{

0%{

transform:scale(1);

}

50%{

transform:scale(1.15);

}

100%{

transform:scale(1);

}

}

.bounce{

animation:bounce .35s;

}

/* ========================= */

#finish{

display:none;

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%) scale(.85);

width:90%;
max-width:430px;

padding:38px;

background:rgba(255,255,255,.95);

border-radius:28px;

backdrop-filter:blur(15px);

box-shadow:0 18px 45px rgba(109,41,50,.18);

text-align:center;

opacity:0;

transition:.4s;

z-index:9999;

}

#finish.show{

display:block;

opacity:1;

transform:translate(-50%,-50%) scale(1);

}

#finish h2{

font-family:'Great Vibes',cursive;

font-size:60px;

color:#6D2932;

margin-bottom:15px;

}

#finish p{

line-height:1.9;

color:#6B5C59;

margin-bottom:25px;

}

#finish button{

padding:16px 42px;

border:none;

border-radius:50px;

background:#6D2932;

color:white;

font-size:17px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

#finish button:hover{

transform:translateY(-3px);

background:#82414C;

}

</style>

</head>

<body>

<div id="game">

<div class="title">

<h1>🤍 Catch My Heart 🤍</h1>

<p>

Catch every little heart from Cecel.<br>

Fill the Love Meter to continue our story.

</p>

</div>

<div class="meter">

<div class="score">

Love Meter 🤍

<br>

<span id="score">

0 / 20

</span>

</div>

<div class="bar">

<div class="fill" id="fill"></div>

</div>

</div>

<div id="basket">

🎁

</div>

<div id="finish">

<h2>Yayyy!! 🤍</h2>

<p>

You caught every little piece of Cecel's heart.

<br><br>

Now...

there's another memory waiting for you.

🌸

</p>

<button id="nextBtn">

Continue Our Story ➜

</button>

</div>

</div>

<div id="popupContainer"></div>

<script>

const game=document.getElementById("game");
const basket=document.getElementById("basket");
const fill=document.getElementById("fill");
const scoreText=document.getElementById("score");

let score=0;
const target=20;

let basketX=window.innerWidth/2;
let finished=false;

/* ===========================
   Gerakan Kado
=========================== */

function moveBasket(x){

const half=35;

if(x<half)x=half;

if(x>window.innerWidth-half)x=window.innerWidth-half;

basketX=x;

basket.style.left=(basketX-32)+"px";

}

document.addEventListener("mousemove",(e)=>{

moveBasket(e.clientX);

});

document.addEventListener("touchstart",(e)=>{

moveBasket(e.touches[0].clientX);

});

document.addEventListener("touchmove",(e)=>{

moveBasket(e.touches[0].clientX);

});

/* ===========================
   Popup Score
=========================== */

function popup(text,color,x,y){

const p=document.createElement("div");

p.className="popup";

p.innerHTML=text;

p.style.color=color;

p.style.left=x+"px";

p.style.top=y+"px";

game.appendChild(p);

setTimeout(()=>{

p.remove();

},800);

}

/* ===========================
   Item Jatuh
=========================== */

function createItem(){

if(finished)return;

const item=document.createElement("div");

item.className="item";

const random=Math.random();

let type="heart";

if(random<0.12){

type="bomb";

item.innerHTML="💣";

}

else if(random>0.88){

type="gold";

item.innerHTML="💖";

}

else{

item.innerHTML="❤️";

}

const startX=Math.random()*(window.innerWidth-40);

item.style.left=startX+"px";

item.style.top="-40px";

game.appendChild(item);

let x=startX;

let y=-40;

const speed=3+Math.random()*2;

const drift=(Math.random()-0.5)*1.4;

const fall=setInterval(()=>{

if(finished){

clearInterval(fall);

item.remove();

return;

}

y+=speed;

x+=drift;

item.style.top=y+"px";

item.style.left=x+"px";

const basketRect=basket.getBoundingClientRect();

const itemRect=item.getBoundingClientRect();

if(

itemRect.bottom>=basketRect.top &&

itemRect.left<basketRect.right &&

itemRect.right>basketRect.left

){

clearInterval(fall);

item.remove();

basket.classList.add("bounce");

setTimeout(()=>{

basket.classList.remove("bounce");

},250);

if(type=="heart"){

score++;

popup("+1 ❤️","#6D2932",basketX,window.innerHeight-120);

}

if(type=="gold"){

score+=3;

popup("+3 💖","#C2185B",basketX,window.innerHeight-120);

}

if(type=="bomb"){

score=Math.max(0,score-2);

popup("-2 💣","#C62828",basketX,window.innerHeight-120);

}

fill.style.width=(score/target*100)+"%";

scoreText.innerHTML=score+" / "+target;

if(score>=15 && score<20){

scoreText.innerHTML="🤍 Almost There...<br>"+score+" / "+target;

}

if(score>=target){

winGame();

}

}

if(y>window.innerHeight+60){

clearInterval(fall);

item.remove();

}

},20);

}

const gameLoop=setInterval(createItem,650);

/* ===========================
   WIN GAME
=========================== */

function winGame(){

if(finished) return;

finished=true;

clearInterval(gameLoop);

scoreText.innerHTML="❤️ COMPLETE ❤️";

fill.style.width="100%";

confettiRain();

setTimeout(()=>{

document.getElementById("finish").classList.add("show");

},1500);

}

/* ===========================
   CONFETTI
=========================== */

function confettiRain(){

const emoji=[

"❤️","🤍","🌸","✨","💖","🌹"

];

let total=90;

let count=0;

const rain=setInterval(()=>{

const c=document.createElement("div");

c.innerHTML=emoji[Math.floor(Math.random()*emoji.length)];

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-40px";

c.style.fontSize=(18+Math.random()*18)+"px";

c.style.pointerEvents="none";

c.style.zIndex="99999";

document.body.appendChild(c);

let x=Math.random()*window.innerWidth;

let y=-40;

let speed=2+Math.random()*3;

let drift=(Math.random()-0.5)*3;

let rotate=Math.random()*360;

const fall=setInterval(()=>{

y+=speed;

x+=drift;

rotate+=2;

c.style.left=x+"px";

c.style.top=y+"px";

c.style.transform=`rotate(${rotate}deg)`;

if(y>window.innerHeight+60){

clearInterval(fall);

c.remove();

}

},20);

count++;

if(count>=total){

clearInterval(rain);

}

},90);

}

/* ===========================
   NEXT PAGE
=========================== */

document.getElementById("nextBtn").onclick=function(){

document.body.style.transition="opacity 1.2s ease";

document.body.style.opacity="0";

setTimeout(()=>{

window.location.href="memory.html";

},1200);

};

</script>

</body>
</html>
